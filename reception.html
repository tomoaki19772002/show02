<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>診察案内システム</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      background: #fce4ec;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 20px;
    }

    h1 {
      font-size: 1.3rem;
      color: #2c5f8a;
      letter-spacing: 0.05em;
    }

    /* 表示パネル */
    .display-panel {
      background: #1a3a5c;
      border-radius: 20px;
      padding: 50px 100px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      min-width: 560px;
    }

    .display-panel .label {
      color: #7eb8e8;
      font-size: 1.4rem;
      margin-bottom: 10px;
      letter-spacing: 0.15em;
    }

    .display-panel .number {
      color: #fff;
      font-size: 11rem;
      font-weight: bold;
      line-height: 1;
      letter-spacing: 0.05em;
      min-height: 1.1em;
      transition: opacity 0.3s;
    }

    .display-panel .number.empty {
      color: #3a5a7a;
      font-size: 4rem;
      line-height: 2.8;
    }

    .display-panel .room-label {
      color: #7eb8e8;
      font-size: 1.4rem;
      margin-top: 20px;
      letter-spacing: 0.1em;
    }

    .display-panel .room-number {
      color: #ffd166;
      font-size: 5rem;
      font-weight: bold;
      min-height: 1.2em;
    }

    .display-panel .room-number.empty {
      color: #3a5a7a;
      font-size: 2rem;
      line-height: 3;
    }

    /* 同期インジケーター */
    .sync-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      padding: 4px 10px;
      border-radius: 12px;
      background: #e8f4ea;
      color: #2c8a5f;
      margin-top: 12px;
    }
    .sync-badge.disconnected { background: #fff0e0; color: #a06000; }
    .sync-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2c8a5f;
      animation: pulse 1.5s infinite;
    }
    .sync-badge.disconnected .sync-dot { background: #a06000; animation: none; }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* 操作パネル */
    .control-panel {
      background: #fff;
      border-radius: 12px;
      padding: 16px 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 420px;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .form-row label {
      font-size: 0.85rem;
      color: #444;
      white-space: nowrap;
      width: 72px;
    }

    .form-row input[type="number"] {
      flex: 1;
      padding: 8px 12px;
      font-size: 1.1rem;
      border: 2px solid #b0c8e0;
      border-radius: 6px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-row input[type="number"]:focus {
      border-color: #2c5f8a;
    }

    .number-input-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .number-input-wrapper input[type="number"] {
      flex: 1;
      -moz-appearance: textfield;
    }

    .number-input-wrapper input[type="number"]::-webkit-inner-spin-button,
    .number-input-wrapper input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }

    .num-btn {
      width: 48px;
      height: 48px;
      font-size: 1.6rem;
      font-weight: bold;
      border: 2px solid #b0c8e0;
      border-radius: 8px;
      background: #f7fafd;
      color: #2c5f8a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .num-btn:hover { background: #e0ecf8; }
    .num-btn:active { background: #c8dff5; transform: scale(0.95); }

    .room-buttons {
      display: flex;
      gap: 10px;
      flex: 1;
    }

    .room-btn {
      flex: 1;
      padding: 8px;
      font-size: 0.95rem;
      border: 2px solid #b0c8e0;
      border-radius: 6px;
      background: #f7fafd;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: bold;
      color: #2c5f8a;
    }

    .room-btn.selected {
      background: #2c5f8a;
      border-color: #2c5f8a;
      color: #fff;
    }

    .room-btn:hover:not(.selected) {
      background: #e0ecf8;
    }

    .announce-btn {
      padding: 10px;
      font-size: 1rem;
      font-weight: bold;
      background: #2c8a5f;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.2s, transform 0.1s;
    }

    .announce-btn:hover { background: #237a52; }
    .announce-btn:active { transform: scale(0.98); }
    .announce-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .repeat-btn {
      padding: 7px;
      font-size: 0.85rem;
      background: #5a7a9a;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.05em;
    }

    .repeat-btn:hover { background: #4a6a8a; }
    .repeat-btn:disabled { background: #aaa; cursor: not-allowed; }

    .clear-btn {
      padding: 8px;
      font-size: 0.85rem;
      background: #fff;
      color: #888;
      border: 2px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .clear-btn:hover { background: #f5f5f5; border-color: #999; color: #555; }

    .status {
      text-align: center;
      font-size: 0.82rem;
      color: #666;
      min-height: 1.2em;
    }

    .status.speaking { color: #2c8a5f; font-weight: bold; }
    .status.error { color: #c0392b; }

    /* 履歴 */
    .history-section {
      width: 420px;
    }

    .history-section h2 {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 8px;
    }

    .history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 150px;
      overflow-y: auto;
    }

    .history-list li {
      background: #fff;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.9rem;
      color: #333;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-list li .time { color: #999; font-size: 0.8rem; }
  </style>
</head>
<body>

  <h1>診察案内システム</h1>

  <div style="border: 3px solid #1a3a5c; border-radius: 8px; padding: 12px 20px; background: #fff; max-width: 560px; text-align: center;">
    <span style="color: #1a3a5c; font-size: 0.9rem; font-weight: bold;">※受付時の番号は院内整理番号です。実際の診察順とは異なります。</span>
  </div>

  <!-- 表示パネル -->
  <div class="display-panel">
    <div class="label">受診番号</div>
    <div class="number empty" id="displayNumber">－</div>
    <div class="room-label">診察室</div>
    <div class="room-number empty" id="displayRoom">－</div>
    <div id="syncBadge" class="sync-badge disconnected">
      <div class="sync-dot"></div>
      <span id="syncText">接続中...</span>
    </div>
  </div>

  <!-- 操作パネル -->
  <div class="control-panel">
    <div class="form-row">
      <label>受診番号</label>
      <div class="number-input-wrapper">
        <button class="num-btn" onclick="changeNumber(-1)">－</button>
        <input type="number" id="patientNumber" min="1" max="100" placeholder="1〜100" />
        <button class="num-btn" onclick="changeNumber(1)">＋</button>
      </div>
    </div>
    <div class="form-row">
      <label>診察室</label>
      <div class="room-buttons">
        <button class="room-btn" id="room1" onclick="selectRoom(1)">１</button>
        <button class="room-btn" id="room3" onclick="selectRoom(3)">３</button>
      </div>
    </div>
    <button class="announce-btn" id="announceBtn" onclick="announce()">📢 案内する</button>
    <button class="repeat-btn" id="repeatBtn" onclick="repeatAnnounce()" disabled>🔁 もう一度</button>
    <button class="clear-btn" onclick="clearDisplay()">現在ご案内していません</button>
    <div class="status" id="status">番号と診察室を選択してください</div>
  </div>

  <!-- 履歴 -->
  <div class="history-section">
    <h2>案内履歴</h2>
    <ul class="history-list" id="historyList"></ul>
  </div>

<script>
  // ── Firebase 設定 ──────────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyAM1kw9lv5z9UO1vi5R5ecT7hcIMQQt_MM",
    authDomain:        "kawagoeasahi-72e5d.firebaseapp.com",
    databaseURL:       "https://kawagoeasahi-72e5d-default-rtdb.firebaseio.com",
    projectId:         "kawagoeasahi-72e5d",
    storageBucket:     "kawagoeasahi-72e5d.firebasestorage.app",
    messagingSenderId: "351069837644",
    appId:             "1:351069837644:web:da3a3c8e877aee299017e9"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const callRef = db.ref('patientCall_show02');

  // ── 状態 ──────────────────────────────────────────────────────
  let selectedRoom = null;
  let lastPatient = null;
  let lastRoom = null;

  // ── 診察室選択 ───────────────────────────────────────────────
  function selectRoom(room) {
    selectedRoom = room;
    document.getElementById('room1').classList.toggle('selected', room === 1);
    document.getElementById('room3').classList.toggle('selected', room === 3);
  }

  // ── 案内ボタン ───────────────────────────────────────────────
  function announce() {
    const numInput = document.getElementById('patientNumber');
    const patient = parseInt(numInput.value, 10);

    if (!patient || patient < 1 || patient > 100) {
      setStatus('受診番号を1〜100で入力してください', 'error');
      return;
    }
    if (!selectedRoom) {
      setStatus('診察室（1番 または 3番）を選択してください', 'error');
      return;
    }

    callRef.set({
      patient,
      room: selectedRoom,
      timestamp: Date.now()
    });
  }

  function clearDisplay() {
    window.speechSynthesis.cancel();
    callRef.set({ cleared: true, timestamp: Date.now() });
  }

  function repeatAnnounce() {
    if (lastPatient && lastRoom) {
      callRef.set({
        patient: lastPatient,
        room: lastRoom,
        timestamp: Date.now()
      });
    }
  }

  // ── Firebase リスナー（全端末で受信・表示・音声）────────────
  let prevTimestamp = null;

  callRef.on('value', snapshot => {
    const data = snapshot.val();
    if (!data || !data.timestamp) return;

    // 初回ロード時（ページ開いた瞬間）は再生しない
    if (prevTimestamp === null) {
      prevTimestamp = data.timestamp;
      if (data.cleared) {
        resetDisplay();
      } else {
        updateDisplay(data.patient, data.room);
        lastPatient = data.patient;
        lastRoom    = data.room;
        document.getElementById('repeatBtn').disabled = false;
      }
      return;
    }

    // 新しいイベントだけ処理
    if (data.timestamp !== prevTimestamp) {
      prevTimestamp = data.timestamp;

      if (data.cleared) {
        // 「ご案内していません」状態
        resetDisplay();
      } else {
        lastPatient = data.patient;
        lastRoom    = data.room;
        updateDisplay(data.patient, data.room);
        addHistory(data.patient, data.room);
        speakAnnouncement(data.patient, data.room);
        document.getElementById('repeatBtn').disabled = false;
      }
    }
  });

  // ── 接続状態インジケーター ───────────────────────────────────
  db.ref('.info/connected').on('value', snap => {
    const badge = document.getElementById('syncBadge');
    const text  = document.getElementById('syncText');
    if (snap.val()) {
      badge.classList.remove('disconnected');
      text.textContent = '全端末同期中';
    } else {
      badge.classList.add('disconnected');
      text.textContent = 'オフライン';
    }
  });

  // ── 音声 ─────────────────────────────────────────────────────
  function speakFallback(text) {
    return new Promise(resolve => {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP'; u.rate = 0.82; u.pitch = 1.0; u.volume = 1.0;
      const voices = window.speechSynthesis.getVoices();
      const maleVoice = voices.find(v => v.name.includes('Keita'))
                     || voices.find(v => v.name.includes('Ichiro'))
                     || voices.find(v => v.name.includes('Takumi'));
      const jaVoice = voices.find(v => v.lang.startsWith('ja'));
      if (maleVoice) {
        u.voice = maleVoice;
      } else if (jaVoice) {
        u.voice = jaVoice;
      }
      u.onend = resolve; u.onerror = resolve;
      window.speechSynthesis.speak(u);
    });
  }

  async function speakAnnouncement(patient, room) {
    const text = `${patient}番のかた、診察室${room}番に、おはいりください。`;
    setStatus(`読み上げ中: 「${text}」`, 'speaking');
    document.getElementById('announceBtn').disabled = true;

    try {
      await speakFallback(text);
    } catch {}

    setStatus('案内完了');
    document.getElementById('announceBtn').disabled = false;
  }

  // ── 表示・履歴 ───────────────────────────────────────────────
  function resetDisplay() {
    const numEl  = document.getElementById('displayNumber');
    const roomEl = document.getElementById('displayRoom');
    numEl.classList.add('empty');  numEl.textContent  = '現在ご案内していません';
    roomEl.classList.add('empty'); roomEl.textContent = '－';
    document.getElementById('repeatBtn').disabled = true;
    setStatus('番号と診察室を選択してください');
  }

  function updateDisplay(patient, room) {
    const numEl  = document.getElementById('displayNumber');
    const roomEl = document.getElementById('displayRoom');
    numEl.classList.remove('empty');  numEl.textContent  = patient;
    roomEl.classList.remove('empty'); roomEl.textContent = room;
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  function addHistory(patient, room) {
    const list = document.getElementById('historyList');
    const time = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    const li = document.createElement('li');
    li.innerHTML = `<span>受診番号 <strong>${patient}番</strong> → 診察室 <strong>${room}番</strong></span><span class="time">${time}</span>`;
    list.prepend(li);
    while (list.children.length > 10) list.removeChild(list.lastChild);
  }

  function changeNumber(delta) {
    const input = document.getElementById('patientNumber');
    const current = parseInt(input.value, 10) || 0;
    const next = Math.min(100, Math.max(1, current + delta));
    input.value = next;
  }

  // ── Enterキー ────────────────────────────────────────────────
  document.getElementById('patientNumber').addEventListener('keydown', e => {
    if (e.key === 'Enter') announce();
  });

</script>
</body>
</html>
